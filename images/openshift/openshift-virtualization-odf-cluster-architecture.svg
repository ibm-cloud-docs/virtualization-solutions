<!-- Key points -->
<rect x="104" y="746" width="1564" height="72" rx="6" fill="#F4F4F4" stroke="#E0E0E0" stroke-width="1"/>
<text fill="#161616" xml:space="preserve" font-family="IBM Plex Sans" font-size="14" font-weight="600"><tspan x="124" y="768">Key points</tspan></text>
<text fill="#525252" xml:space="preserve" font-family="IBM Plex Sans" font-size="12"><tspan x="124" y="788">• Storage and compute pools share the same VPC and cluster but run on separate dedicated bare metal nodes.</tspan></text>
<text fill="#525252" xml:space="preserve" font-family="IBM Plex Sans" font-size="12"><tspan x="124" y="806">• The NoSchedule taint prevents VM pods from scheduling on storage nodes. Compute nodes scale independently from storage nodes.</tspan></text>
